###############################################################################

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

###############################################################################

before_script:
  - |
    # Start of Pre-setup ...
    echo -e "section_start:`date +%s`:Pre-setup_section[collapsed=true]\r\e[0K\033[0;36mPre-setup ...\033[0m" || true
  - apk update || true
  - apk add git
  - git fetch origin
  - git checkout -B "$CI_COMMIT_REF_NAME" "origin/$CI_COMMIT_REF_NAME"
  - |
    # End of Pre-setup ...
    echo -e "section_end:`date +%s`:Pre-setup_section\r\e[0K" || true

###############################################################################

pages:
  stage: deploy
  image: alpine:edge
  tags:
    - saas-linux-2xlarge-amd64
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - |
      # Start of Setup ...
      echo -e "section_start:`date +%s`:Setup_section[collapsed=true]\r\e[0K\033[0;36mSetup ...\033[0m" || true
    - export TZ=UTC
    - apk update || true
    - apk add '!usr-merge-nag' 2> /dev/null || true
    - apk upgrade --prune || true
    - apk add make gcc libc-dev upx dev86
    - ( cd /tmp && git clone https://github.com/dmsc/emu2.git && cd emu2 && make -j $(nproc) && make install && cd .. && rm -rf ./emu2 )
    - ( cd /tmp && { git clone https://gitlab.com/johnsonjh/old_c.git || git clone https://github.com/johnsonjh/old_c.git; } )
    - mkdir -p public
    - |
      # End of Setup ...
      echo -e "section_end:`date +%s`:Setup_section\r\e[0K" || true
    - |
      # Start of dev86 build ...
      echo -e "section_start:`date +%s`:dev86_section[collapsed=true]\r\e[0K\033[0;36mdev86 ...\033[0m" || true
    - mkdir -p public/dev86
    - bcc -Md -O -v -o crc.com crc.c && upx --8086 -9 crc.com 2>&1 | grep '\->' && mv -f crc.com public/dev86 && emu2 public/dev86/crc.com --auto public/dev86/crc.com crc.c
    - |
      # End of dev86 build ...
      echo -e "section_end:`date +%s`:dev86_section\r\e[0K" || true
    - |
      # Start of Turbo C++ 1.01 build ...
      echo -e "section_start:`date +%s`:TCPP101_section[collapsed=true]\r\e[0K\033[0;36mTurbo C++ 1.01 ...\033[0m" || true
    - mkdir -p public/TCPP101
    - env EMU2_APPEND=/tmp/old_c/TCPP101/bin EMU2_DRIVE_C=/tmp/old_c/TCPP101 EMU2_DRIVE_D=. emu2 /tmp/old_c/TCPP101/bin/tcc.exe -Iinclude -Llib -G -O -Z -f- -mt -lt "D:\crc.c" -- PATH='C:\BIN' LIB='C:\LIB' INCLUDE='C:\INCLUDE' && cp -f /tmp/old_c/TCPP101/crc.com . && rm -f /tmp/old_c/TCPP101/crc.* && upx --8086 -9 crc.com 2>&1 | grep '\->' && mv -f crc.com public/TCPP101 && emu2 public/TCPP101/crc.com --auto public/TCPP101/crc.com crc.c
    - |
      # End of Turbo C++ 1.01 build ...
      echo -e "section_end:`date +%s`:TCPP101_section\r\e[0K" || true
    - |
      # Start of Turbo C 1.5 build ...
      echo -e "section_start:`date +%s`:TC15_section[collapsed=true]\r\e[0K\033[0;36mTurbo C 1.5 ...\033[0m" || true
    - mkdir -p public/TC15
    - env EMU2_APPEND=/tmp/old_c/TC15 EMU2_DRIVE_C=/tmp/old_c/TC15 EMU2_DRIVE_D=. emu2 /tmp/old_c/TC15/tcc.exe -I. -L. -G -O -Z -f- -mt "D:\crc.c" -- PATH='C:\' LIB='C:\' INCLUDE='C:\' && env EMU2_DOSVER=3.20 EMU2_DRIVE_C=/tmp/old_c/TC15 EMU2_DRIVE_D=. emu2 /tmp/old_c/TC15/exe2bin.exe crc.exe crc.com && cp -f /tmp/old_c/TC15/crc.com . && rm -f /tmp/old_c/TC15/crc.* && upx --8086 -9 crc.com 2>&1 | grep '\->' && mv -f crc.com public/TC15 && emu2 public/TC15/crc.com --auto public/TC15/crc.com crc.c
    - |
      # End of Turbo C 1.5 build ...
      echo -e "section_end:`date +%s`:TC15_section\r\e[0K" || true
    - |
      # Start of Turbo C 1.0 build ...
      echo -e "section_start:`date +%s`:TC10_section[collapsed=true]\r\e[0K\033[0;36mTurbo C 1.0 ...\033[0m" || true
    - mkdir -p public/TC10
    - env EMU2_APPEND=/tmp/old_c/TC10 EMU2_DRIVE_C=/tmp/old_c/TC10 EMU2_DRIVE_D=. emu2 /tmp/old_c/TC10/tcc.exe -I. -L. -G -O -Z -f- -mt "D:\crc.c" -- PATH='C:\' LIB='C:\' INCLUDE='C:\' && env EMU2_DOSVER=3.20 EMU2_DRIVE_C=/tmp/old_c/TC10 EMU2_DRIVE_D=. emu2 /tmp/old_c/TC10/exe2bin.exe crc.exe crc.com && cp -f /tmp/old_c/TC10/crc.com . && rm -f /tmp/old_c/TC10/crc.* && upx --8086 -9 crc.com 2>&1 | grep '\->' && mv -f crc.com public/TC10 && emu2 public/TC10/crc.com --auto public/TC10/crc.com crc.c
    - |
      # End of Turbo C 1.0 build ...
      echo -e "section_end:`date +%s`:TC10_section\r\e[0K" || true
    - |
      # Start of Microsoft C 6.00A build ...
      echo -e "section_start:`date +%s`:MSC600A_section[collapsed=true]\r\e[0K\033[0;36mMicrosoft C 6.00A ...\033[0m" || true
    - mkdir -p public/MSC600A
    - true -- NOTE -- 'warning C4135 - conversion between different integral types' messages are expected for MSC600A builds!
    - ( cd /tmp/old_c/MSC600A && cp -f $CI_PROJECT_DIR/crc.c . && emu2 bin/cl.exe /W4 /AT /O /Ot /Ol /Og /Oi /Gr /Gs /Fecrc.com crc.c -- INCLUDE=include LIB=lib PATH='bin;binb' && upx --8086 -9 crc.com 2>&1 | grep '\->' && cp -f crc.com $CI_PROJECT_DIR/public/MSC600A && emu2 $CI_PROJECT_DIR/public/MSC600A/crc.com --auto $CI_PROJECT_DIR/public/MSC600A crc.c && rm -f crc.* )
    - |
      # End of Microsoft C 6.00A build ...
      echo -e "section_end:`date +%s`:MSC600A_section\r\e[0K" || true
  artifacts:
    expire_in: 1 day
    paths:
      - public
  retry: 2
  timeout: 60 minutes
  interruptible: false

###############################################################################
